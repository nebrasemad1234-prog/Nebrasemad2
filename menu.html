<div class="page">

<div class="box">

<h3>برجر النبراس</h3>
<p>برجر لحم مشوي</p>
<div class="price">7000 جنيه</div>
<button class="btn" onclick="addToCart('برجر النبراس', 7000, 'Picture/Image2/burger.jpg')">اضافة الي السلة</button>

<div class="box">

<h3>طبق حمص</h3>
<p>حمص بالطحينة</p>
<div class="price">4000 جنيه</div>
<button class="btn" onclick="addToCart('طبق حمص', 4000, 'Picture/Image2/Hummus.jpg')">اضافة الي السلة</button>

<div class="box">

<h3>كباب مشوي</h3>

<div class="box">

<div class="price">9000 جنيه</div>
<button class="btn" onclick="addToCart('شيش طاووق', 9000, 'Picture/Image2/Shish.jpg')">اضافة الي السلة</button>
</div>

</div>

<script>
function addToCart(name, price, image){
    let cart = JSON.parse(localStorage.getItem('cart')) || []; // جيب السلة القديمة
    let item = cart.find(i => i.name === name); // شوف هل الصنف موجود
    
    if(item){
        item.qty += 1; // لو موجود زيد الكمية
    } else {
        cart.push({name: name, price: price, image: image, qty: 1}); // لو جديد ضيفو
    }
    
    localStorage.setItem('cart', JSON.stringify(cart)); // خزن السلة
    alert(name + " ✅ تمت الاضافة للسلة");
    window.location.href = 'cart.html'; // وديك للسلة طوالي
}
</script>
